<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open API 客户端</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            color: #1f2937;
            background: #f4f6f8;
        }
        .page {
            max-width: 760px;
            margin: 0 auto;
            padding: 48px 20px;
        }
        .header {
            margin-bottom: 22px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 28px;
            line-height: 1.3;
        }
        .subtle {
            color: #6b7280;
            font-size: 14px;
        }
        .panel {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 22px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        label {
            font-size: 13px;
            font-weight: 700;
            color: #374151;
        }
        input {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 10px 12px;
            font: inherit;
            color: #111827;
            background: #fff;
        }
        input:focus {
            outline: 2px solid #bfdbfe;
            border-color: #2563eb;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }
        button, .button-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            border: 0;
            border-radius: 6px;
            padding: 10px 16px;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            background: #2563eb;
            color: #fff;
        }
        button.secondary {
            background: #e5e7eb;
            color: #111827;
        }
        .button-link.disabled {
            opacity: 0.55;
            pointer-events: none;
            cursor: not-allowed;
        }
        .status {
            margin-top: 14px;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            background: #f3f4f6;
            color: #374151;
        }
        .status.ok {
            background: #ecfdf5;
            color: #047857;
        }
        .status.error {
            background: #fef2f2;
            color: #b91c1c;
        }
    </style>
</head>
<body>
<main class="page">
    <section class="header">
        <h1>Open API 客户端</h1>
        <div class="subtle">先填写接口配置，配置会保存在当前浏览器中，后续功能页会自动复用。</div>
    </section>

    <section class="panel">
        <div class="field">
            <label for="baseUrl">服务地址</label>
            <input id="baseUrl" value="https://esimapi.esimtours.com" placeholder="例如：https://esimapi.esimtours.com">
        </div>
        <div class="field">
            <label for="accessKey">AccessKey</label>
            <input id="accessKey" placeholder="请输入 X-Access-Key">
        </div>
        <div class="field">
            <label for="accessSecret">AccessSecret</label>
            <input id="accessSecret" type="password" placeholder="请输入 AccessSecret">
        </div>
        <div class="actions">
            <button id="saveBtn" type="button">保存配置</button>
            <button id="resetConfigBtn" class="secondary" type="button">重置配置</button>
            <a id="enterBtn" class="button-link disabled" href="order-search.html">进入订单查询</a>
        </div>
        <div id="status" class="status">请填写完整接口配置。</div>
    </section>
</main>

<script src="common.js"></script>
<script>
    var configStorageKey = "esimOpenApiClientConfig";
    window.configStorageKey = configStorageKey;

    function hasCompleteConfig() {
        return byId("baseUrl").value.trim() &&
            byId("accessKey").value.trim() &&
            byId("accessSecret").value;
    }

    function refreshState() {
        var ok = hasCompleteConfig();
        var enterBtn = byId("enterBtn");
        enterBtn.className = "button-link" + (ok ? "" : " disabled");
        setStatus(ok ? "配置已就绪，可以进入功能页。" : "请填写完整接口配置。", ok ? "ok" : "");
    }

    byId("saveBtn").addEventListener("click", function () {
        saveConfig();
        refreshState();
    });
    byId("resetConfigBtn").addEventListener("click", function () {
        resetConfig();
        refreshState();
    });
    ["baseUrl", "accessKey", "accessSecret"].forEach(function (id) {
        byId(id).addEventListener("input", function () {
            saveConfig();
            refreshState();
        });
    });

    loadSavedConfig();
    refreshState();
</script>
</body>
</html>
