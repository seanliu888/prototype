<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open API 套餐查询</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            color: #1f2937;
            background: #f4f6f8;
        }
        .page {
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px 20px 40px;
        }
        .header { margin-bottom: 20px; }
        h1 {
            margin: 0 0 8px;
            font-size: 24px;
            line-height: 1.3;
        }
        h2 {
            margin: 0;
            font-size: 18px;
            line-height: 1.4;
        }
        .subtle {
            color: #6b7280;
            font-size: 14px;
        }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        .tab-link {
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            padding: 8px 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            color: #374151;
            background: #fff;
            font-weight: 700;
            text-decoration: none;
        }
        .tab-link.active {
            border-color: #2563eb;
            color: #fff;
            background: #2563eb;
        }
        .panel {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 18px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
        }
        .panel-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }
        .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-size: 13px;
            font-weight: 700;
            color: #374151;
        }
        input, select, textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 10px 12px;
            font: inherit;
            color: #111827;
            background: #fff;
        }
        input:focus, select:focus, textarea:focus {
            outline: 2px solid #bfdbfe;
            border-color: #2563eb;
        }
        textarea {
            min-height: 190px;
            resize: vertical;
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }
        button {
            border: 0;
            border-radius: 6px;
            padding: 10px 16px;
            font-weight: 700;
            cursor: pointer;
            background: #2563eb;
            color: #fff;
            min-height: 40px;
        }
        button.secondary {
            background: #e5e7eb;
            color: #111827;
        }
        button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }
        .link-button {
            background: #eef2ff;
            color: #1d4ed8;
            min-height: 32px;
            padding: 6px 10px;
            font-size: 13px;
        }
        .status {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            background: #f3f4f6;
            color: #374151;
        }
        .status.ok {
            background: #ecfdf5;
            color: #047857;
        }
        .status.error {
            background: #fef2f2;
            color: #b91c1c;
        }
        .list-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: end;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 12px;
        }
        .pager {
            display: flex;
            flex-wrap: wrap;
            align-items: end;
            gap: 10px;
        }
        .pager .field { width: 92px; }
        .table-wrap { overflow: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 980px;
            font-size: 13px;
        }
        th, td {
            border-bottom: 1px solid #e5e7eb;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        th {
            color: #374151;
            background: #f9fafb;
            white-space: nowrap;
        }
        .empty {
            padding: 28px;
            text-align: center;
            color: #6b7280;
        }
        .modal-mask {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(15, 23, 42, 0.55);
        }
        .modal-mask.show { display: flex; }
        .modal {
            width: min(1080px, 100%);
            max-height: min(760px, calc(100vh - 40px));
            overflow: auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.28);
        }
        .modal-header {
            position: sticky;
            top: 0;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px;
            border-bottom: 1px solid #e5e7eb;
            background: #fff;
        }
        .modal-body { padding: 18px; }
        .detail-section { margin-bottom: 18px; }
        .detail-section h3 {
            margin: 0 0 10px;
            font-size: 15px;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }
        .detail-card {
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 10px;
            background: #f9fafb;
        }
        .detail-label {
            margin-bottom: 4px;
            color: #6b7280;
            font-size: 12px;
        }
        .detail-value {
            word-break: break-word;
            color: #111827;
            font-size: 13px;
            font-weight: 700;
        }
        @media (max-width: 760px) {
            .grid, .grid-3 { grid-template-columns: 1fr; }
            .panel-title, .list-toolbar {
                align-items: stretch;
                flex-direction: column;
            }
            .pager .field { width: calc(50% - 5px); }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<main class="page">
    <section class="header">
        <h1>Open API 套餐查询</h1>
        <div class="subtle">调用 POST /api/open/v1/package/search，按当前项目签名规则自动生成请求头。</div>
        <nav class="tabs" aria-label="Open API 功能切换">
            <a class="tab-link" href="order-search.html">订单查询</a>
            <a class="tab-link" href="esim-search.html">eSIM 查询</a>
            <a class="tab-link active" href="package-search.html">套餐查询</a>
            <a class="tab-link" href="order-create.html">创建订单</a>
        </nav>
    </section>

    <section class="panel">
        <div class="panel-title">
            <h2>接口配置</h2>
            <button id="resetConfigBtn" class="secondary" type="button">重置配置</button>
        </div>
        <div class="grid">
            <div class="field">
                <label for="baseUrl">服务地址</label>
                <input id="baseUrl" value="https://esimapi.esimtours.com" placeholder="例如：https://esimapi.esimtours.com">
            </div>
            <div class="field">
                <label for="accessKey">AccessKey</label>
                <input id="accessKey" placeholder="请输入 X-Access-Key">
            </div>
            <div class="field">
                <label for="accessSecret">AccessSecret</label>
                <input id="accessSecret" type="password" placeholder="请输入 AccessSecret">
            </div>
        </div>
    </section>

    <section class="panel">
        <div class="panel-title">
            <h2>筛选条件</h2>
            <div class="subtle">未填写的条件不会传入请求。</div>
        </div>
        <div class="grid grid-3">
            <div class="field">
                <label for="packageCode">套餐编码</label>
                <input id="packageCode" placeholder="可选">
            </div>
            <div class="field">
                <label for="type">套餐类型</label>
                <select id="type">
                    <option value="">全部类型</option>
                    <option value="COUNTRY">国家套餐</option>
                    <option value="REGION">区域套餐</option>
                    <option value="GLOBAL">全球套餐</option>
                </select>
            </div>
            <div class="field">
                <label for="locationCode">覆盖地区</label>
                <input id="locationCode" placeholder="可选，例如 CN">
            </div>
        </div>
        <div class="actions">
            <button id="searchBtn" type="button">查询套餐</button>
            <button id="sampleBtn" class="secondary" type="button">刷新请求 Body</button>
            <button id="clearBtn" class="secondary" type="button">清空结果</button>
        </div>
        <div id="status" class="status">待请求</div>
    </section>

    <section class="panel">
        <div class="field">
            <label for="requestBody">请求 Body</label>
            <textarea id="requestBody"></textarea>
        </div>
    </section>

    <section class="panel">
        <div class="list-toolbar">
            <div>
                <h2>套餐列表</h2>
                <div id="summary" class="subtle" style="margin-top: 6px;"></div>
            </div>
            <div class="pager">
                <div class="field">
                    <label for="page">页码</label>
                    <input id="page" type="number" min="1" value="1">
                </div>
                <div class="field">
                    <label for="limit">每页条数</label>
                    <input id="limit" type="number" min="1" value="10">
                </div>
                <button id="prevBtn" class="secondary" type="button">上一页</button>
                <button id="nextBtn" class="secondary" type="button">下一页</button>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>套餐编码</th>
                    <th>套餐名称</th>
                    <th>类型</th>
                    <th>流量</th>
                    <th>有效期</th>
                    <th>币种</th>
                    <th>售价</th>
                    <th>建议零售价</th>
                    <th>支持加油包</th>
                    <th>详情</th>
                </tr>
                </thead>
                <tbody id="packagesBody">
                <tr><td class="empty" colspan="10">暂无数据</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="panel">
        <div class="field">
            <label for="responseText">原始响应</label>
            <textarea id="responseText" readonly></textarea>
        </div>
    </section>
</main>

<div id="detailModal" class="modal-mask" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
    <div class="modal">
        <div class="modal-header">
            <div>
                <h2 id="detailTitle">套餐详情</h2>
                <div id="detailSubTitle" class="subtle"></div>
            </div>
            <button id="closeDetailBtn" class="secondary" type="button">关闭</button>
        </div>
        <div id="detailBody" class="modal-body"></div>
    </div>
</div>

<script src="common.js"></script>
<script>
    var apiPath = "/api/open/v1/package/search";
    var successCode = "000000";
    var configStorageKey = "esimOpenApiClientConfig";
    var currentPackages = [];
    var packageTypeText = {
        COUNTRY: "国家套餐",
        REGION: "区域套餐",
        GLOBAL: "全球套餐"
    };

    function buildBodyFromFields() {
        var body = {
            page: normalizePositiveNumber(byId("page").value, 1),
            limit: normalizePositiveNumber(byId("limit").value, 10)
        };
        var packageCode = byId("packageCode").value.trim();
        var type = byId("type").value;
        var locationCode = byId("locationCode").value.trim();
        if (packageCode) body.packageCode = packageCode;
        if (type) body.type = type;
        if (locationCode) body.locationCode = locationCode;
        return body;
    }

    function syncBodyTextarea() {
        byId("requestBody").value = JSON.stringify(buildBodyFromFields(), null, 2);
    }

    function renderPackages(pageData) {
        var tbody = byId("packagesBody");
        var rows = pageData && Array.isArray(pageData.data) ? pageData.data : [];
        currentPackages = rows;
        byId("summary").textContent = pageData
            ? "第 " + pageData.page + " 页，每页 " + pageData.limit + " 条，共 " + pageData.total + " 条 / " + pageData.pages + " 页"
            : "";

        if (!rows.length) {
            tbody.innerHTML = '<tr><td class="empty" colspan="10">暂无数据</td></tr>';
            return;
        }

        tbody.innerHTML = rows.map(function (item, index) {
            return "<tr>" +
                "<td>" + escapeHtml(item.packageCode) + "</td>" +
                "<td>" + escapeHtml(item.packageName) + "</td>" +
                "<td>" + escapeHtml(packageTypeText[item.type] || item.type) + "</td>" +
                "<td>" + escapeHtml(formatData(item.data, item.dataUnit)) + "</td>" +
                "<td>" + escapeHtml(formatDuration(item.duration, item.durationUnit)) + "</td>" +
                "<td>" + escapeHtml(item.currency) + "</td>" +
                "<td>" + escapeHtml(item.price) + "</td>" +
                "<td>" + escapeHtml(item.retailPrice) + "</td>" +
                "<td>" + escapeHtml(item.supportTopUp ? "支持" : "不支持") + "</td>" +
                '<td><button class="link-button" type="button" data-detail-index="' + index + '">查看</button></td>' +
                "</tr>";
        }).join("");
    }

    function showPackageDetail(index) {
        var pkg = currentPackages[index];
        if (!pkg) {
            return;
        }
        byId("detailSubTitle").textContent = "套餐编码：" + (pkg.packageCode || "-");
        byId("detailBody").innerHTML = buildDetailHtml(pkg);
        byId("detailModal").classList.add("show");
    }

    function closePackageDetail() {
        byId("detailModal").classList.remove("show");
    }

    function buildDetailHtml(pkg) {
        return '<div class="detail-section">' +
            '<h3>套餐信息</h3>' +
            '<div class="detail-grid">' +
            detailCard("套餐编码", pkg.packageCode) +
            detailCard("套餐名称", pkg.packageName) +
            detailCard("类型", packageTypeText[pkg.type] || pkg.type) +
            detailCard("支持加油包", pkg.supportTopUp ? "支持" : "不支持") +
            detailCard("流量", formatData(pkg.data, pkg.dataUnit)) +
            detailCard("有效期", formatDuration(pkg.duration, pkg.durationUnit)) +
            detailCard("币种", pkg.currency) +
            detailCard("售价", pkg.price) +
            detailCard("建议零售价", pkg.retailPrice) +
            '</div></div>' +
            buildLocationsHtml(pkg.locations) +
            buildTopUpsHtml(pkg.topUps);
    }

    function buildLocationsHtml(locations) {
        var rows = [];
        (Array.isArray(locations) ? locations : []).forEach(function (location) {
            var operators = Array.isArray(location.operators) ? location.operators : [];
            if (!operators.length) {
                rows.push("<tr>" +
                    "<td>" + escapeHtml(location.iso2) + "</td>" +
                    "<td>" + escapeHtml(location.name) + "</td>" +
                    "<td>-</td><td>-</td><td>-</td><td>-</td>" +
                    "</tr>");
                return;
            }
            operators.forEach(function (operator) {
                rows.push("<tr>" +
                    "<td>" + escapeHtml(location.iso2) + "</td>" +
                    "<td>" + escapeHtml(location.name) + "</td>" +
                    "<td>" + escapeHtml(operator.code) + "</td>" +
                    "<td>" + escapeHtml(operator.name) + "</td>" +
                    "<td>" + escapeHtml(operator.mcc) + "</td>" +
                    "<td>" + escapeHtml(operator.mnc) + "</td>" +
                    "</tr>");
            });
        });

        if (!rows.length) {
            return '<div class="detail-section"><h3>覆盖地区</h3><div class="empty">暂无覆盖地区明细</div></div>';
        }

        return '<div class="detail-section">' +
            '<h3>覆盖地区</h3>' +
            '<div class="table-wrap">' +
            '<table><thead><tr>' +
            '<th>国家/地区编码</th><th>国家/地区名称</th><th>运营商编码</th><th>运营商名称</th><th>MCC</th><th>MNC</th>' +
            '</tr></thead><tbody>' + rows.join("") + '</tbody></table>' +
            '</div></div>';
    }

    function buildTopUpsHtml(topUps) {
        var rows = (Array.isArray(topUps) ? topUps : []).map(function (topUp) {
            return "<tr>" +
                "<td>" + escapeHtml(topUp.packageCode) + "</td>" +
                "<td>" + escapeHtml(topUp.topUpCode) + "</td>" +
                "<td>" + escapeHtml(formatData(topUp.data, topUp.dataUnit)) + "</td>" +
                "<td>" + escapeHtml(topUp.currency) + "</td>" +
                "<td>" + escapeHtml(topUp.price) + "</td>" +
                "</tr>";
        });

        if (!rows.length) {
            return '<div class="detail-section"><h3>加油包</h3><div class="empty">暂无加油包明细</div></div>';
        }

        return '<div class="detail-section">' +
            '<h3>加油包</h3>' +
            '<div class="table-wrap">' +
            '<table><thead><tr>' +
            '<th>所属套餐编码</th><th>加油包编码</th><th>流量</th><th>币种</th><th>售价</th>' +
            '</tr></thead><tbody>' + rows.join("") + '</tbody></table>' +
            '</div></div>';
    }

    function formatData(data, unit) {
        if (data == null && !unit) {
            return "";
        }
        return [data, unit].filter(function (value) {
            return value != null && value !== "";
        }).join(" ");
    }

    function formatDuration(duration, unit) {
        if (duration == null && !unit) {
            return "";
        }
        return [duration, unit].filter(function (value) {
            return value != null && value !== "";
        }).join(" ");
    }

    async function searchPackages() {
        syncBodyTextarea();
        saveConfig();

        var baseUrl = trimTrailingSlash(byId("baseUrl").value);
        var accessKey = byId("accessKey").value.trim();
        var accessSecret = byId("accessSecret").value;
        if (!baseUrl || !accessKey || !accessSecret) {
            setStatus("请先填写服务地址、AccessKey、AccessSecret。", "error");
            return;
        }

        var body;
        try {
            body = JSON.parse(byId("requestBody").value);
        } catch (error) {
            setStatus("请求 Body 不是合法 JSON：" + error.message, "error");
            return;
        }

        var btn = byId("searchBtn");
        btn.disabled = true;
        setStatus("请求中...");

        try {
            var headers = await buildHeaders(accessKey, accessSecret);
            var response = await fetch(baseUrl + apiPath, {
                method: "POST",
                headers: headers,
                body: JSON.stringify(body)
            });
            var text = await response.text();
            byId("responseText").value = text;

            var json;
            try {
                json = text ? JSON.parse(text) : null;
            } catch (parseError) {
                setStatus("HTTP " + response.status + "，响应不是 JSON。", "error");
                renderPackages(null);
                return;
            }

            if (!response.ok) {
                setStatus("HTTP " + response.status + " 请求失败。", "error");
                renderPackages(null);
                return;
            }

            if (!json || json.code !== successCode) {
                var code = json && json.code ? json.code : "无 code";
                var message = json && json.message ? json.message : "接口未返回成功码";
                setStatus("接口返回错误：" + code + " " + message, "error");
                renderPackages(json ? json.data : null);
                return;
            }

            setStatus("查询成功：" + successCode, "ok");
            renderPackages(json.data);
        } catch (error) {
            setStatus("请求异常：" + error.message, "error");
            renderPackages(null);
        } finally {
            btn.disabled = false;
        }
    }

    function changePage(delta) {
        var current = normalizePositiveNumber(byId("page").value, 1);
        byId("page").value = Math.max(1, current + delta);
        searchPackages();
    }

    byId("sampleBtn").addEventListener("click", syncBodyTextarea);
    byId("clearBtn").addEventListener("click", function () {
        byId("responseText").value = "";
        byId("summary").textContent = "";
        renderPackages(null);
        setStatus("已清空结果。");
    });
    byId("resetConfigBtn").addEventListener("click", function () {
        resetConfig();
        setStatus("接口配置已重置。");
    });
    byId("searchBtn").addEventListener("click", searchPackages);
    byId("prevBtn").addEventListener("click", function () {
        changePage(-1);
    });
    byId("nextBtn").addEventListener("click", function () {
        changePage(1);
    });
    byId("packagesBody").addEventListener("click", function (event) {
        var button = event.target.closest("[data-detail-index]");
        if (!button) {
            return;
        }
        showPackageDetail(Number(button.getAttribute("data-detail-index")));
    });
    byId("closeDetailBtn").addEventListener("click", closePackageDetail);
    byId("detailModal").addEventListener("click", function (event) {
        if (event.target === byId("detailModal")) {
            closePackageDetail();
        }
    });
    document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
            closePackageDetail();
        }
    });

    ["packageCode", "type", "locationCode", "page", "limit"].forEach(function (id) {
        byId(id).addEventListener("change", syncBodyTextarea);
    });
    bindConfigInputs();
    loadSavedConfig();
    syncBodyTextarea();
</script>
</body>
</html>
