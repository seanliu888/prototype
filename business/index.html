<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSIM TOURS Business</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">
                    <i class="bi bi-buildings"></i>
                </div>
                <div>
                    <div class="brand-name">eSIM TOURS</div>
                    <div class="brand-subtitle">Business</div>
                </div>
            </div>

            <nav class="nav" aria-label="主菜单">
                <a class="nav-item active" href="index.html">
                    <i class="bi bi-house-door nav-icon"></i>
                    <span>首页</span>
                </a>
                <a class="nav-item" href="esim-store.html">
                    <i class="bi bi-shop nav-icon"></i>
                    <span>eSIM 商店</span>
                </a>
                <a class="nav-item" href="#">
                    <i class="bi bi-sim nav-icon"></i>
                    <span>eSIM 管理</span>
                </a>
                <a class="nav-item" href="#">
                    <i class="bi bi-receipt nav-icon"></i>
                    <span>订单</span>
                </a>
                <a class="nav-item" href="#">
                    <i class="bi bi-key nav-icon"></i>
                    <span>API 集成</span>
                </a>
                <a class="nav-item" href="#">
                    <i class="bi bi-people nav-icon"></i>
                    <span>用户</span>
                </a>
                <a class="nav-item" href="#">
                    <i class="bi bi-wallet2 nav-icon"></i>
                    <span>余额</span>
                </a>
                <a class="nav-item" href="#">
                    <i class="bi bi-file-earmark-text nav-icon"></i>
                    <span>账单</span>
                </a>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <div>
                    <h1>首页</h1>
                    <p>查看企业 eSIM 业务概览与待办事项</p>
                </div>
                <div class="account">
                    <span class="account-name">Admin</span>
                    <span class="account-role">管理员</span>
                </div>
            </header>

            <section class="content">
                <div class="stats-grid">
                    <article class="stat-card">
                        <span class="stat-label">可用余额</span>
                        <strong class="stat-value">$12,480.00</strong>
                    </article>
                    <article class="stat-card">
                        <span class="stat-label">本月订单</span>
                        <strong class="stat-value">128</strong>
                    </article>
                    <article class="stat-card">
                        <span class="stat-label">活跃 eSIM</span>
                        <strong class="stat-value">342</strong>
                    </article>
                    <article class="stat-card">
                        <span class="stat-label">待审核申请</span>
                        <strong class="stat-value">6</strong>
                    </article>
                </div>

                <div class="panel">
                    <div class="panel-header">
                        <h2>待办事项</h2>
                    </div>
                    <div class="todo-list">
                        <div class="todo-item">
                            <span class="todo-status warning"></span>
                            <div>
                                <strong>员工购买申请待审核</strong>
                                <p>6 条申请等待管理员或运营处理</p>
                            </div>
                        </div>
                        <div class="todo-item">
                            <span class="todo-status info"></span>
                            <div>
                                <strong>余额提醒</strong>
                                <p>当前余额可支持近期采购，建议财务定期核对</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
