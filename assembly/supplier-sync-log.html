<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同步日志 - eSIM 集成商管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../chrome-compatibility.css">
    <link rel="stylesheet" href="assembly-common.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 px-0 sidebar">
                <div class="brand-logo">
                    <i class="bi bi-building-gear me-2"></i>集成商管理
                </div>
                <nav class="nav flex-column">
                    <a class="nav-link" href="index.html"><i class="bi bi-house-door-fill"></i>首页概览</a>
                    <div class="nav-section-title">供应商</div>
                    <a class="nav-link" href="supplier-list.html"><i class="bi bi-truck"></i>供应商管理</a>
                    <a class="nav-link" href="catalog-list.html"><i class="bi bi-collection"></i>套餐目录</a>
                    <div class="nav-section-title">集成商</div>
                    <a class="nav-link" href="integrator-list.html"><i class="bi bi-people-fill"></i>集成商管理</a>
                    <a class="nav-link" href="pricing-list.html"><i class="bi bi-currency-dollar"></i>集成商定价</a>
                    <a class="nav-link" href="order-list.html"><i class="bi bi-cart-check"></i>套餐订单</a>
                    <a class="nav-link" href="esim-list.html"><i class="bi bi-sim"></i>eSIM管理</a>
                    <a class="nav-link" href="billing-transactions.html"><i class="bi bi-wallet2"></i>财务与结算</a>
                    <div class="nav-section-title">开放能力</div>
                    <a class="nav-link" href="developer-api.html"><i class="bi bi-key-fill"></i>开发者与 API</a>
                </nav>
            </div>
            <div class="col-md-10 main-content">
                <div class="page-header">
                    <div>
                        <h1><i class="bi bi-arrow-repeat me-2"></i>同步日志</h1>
                        <small class="text-muted">按供应商、时间范围查看同步记录；展示同步时间、成功/失败、失败原因；支持重试</small>
                    </div>
                    <a href="supplier-list.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>返回供应商列表</a>
                </div>
                <div class="content-card">
                    <div class="filter-section">
                        <div class="row g-3">
                            <div class="col-md-2">
                                <label class="form-label">供应商</label>
                                <select class="form-select">
                                    <option value="">全部</option>
                                    <option value="SUP-001">eSIM 全球供</option>
                                    <option value="SUP-002">跨境 eSIM 源</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">时间起</label>
                                <input type="date" class="form-control">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">时间止</label>
                                <input type="date" class="form-control">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">结果</label>
                                <select class="form-select">
                                    <option value="">全部</option>
                                    <option value="SUCCESS">成功</option>
                                    <option value="FAILED">失败</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">&nbsp;</label>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-primary flex-grow-1"><i class="bi bi-search me-1"></i>查询</button>
                                    <button class="btn btn-outline-secondary"><i class="bi bi-arrow-clockwise"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>同步时间</th>
                                    <th>供应商</th>
                                    <th>结果</th>
                                    <th>同步数量</th>
                                    <th>失败原因</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>2025-02-28 09:00:15</td>
                                    <td>eSIM 全球供</td>
                                    <td><span class="badge bg-success">成功</span></td>
                                    <td>128 条</td>
                                    <td>—</td>
                                    <td>—</td>
                                </tr>
                                <tr>
                                    <td>2025-02-28 08:30:00</td>
                                    <td>跨境 eSIM 源</td>
                                    <td><span class="badge bg-success">成功</span></td>
                                    <td>96 条</td>
                                    <td>—</td>
                                    <td>—</td>
                                </tr>
                                <tr class="table-warning">
                                    <td>2025-02-27 18:00:02</td>
                                    <td>eSIM 全球供</td>
                                    <td><span class="badge bg-danger">失败</span></td>
                                    <td>0</td>
                                    <td><small>API 超时 (504)</small></td>
                                    <td><button class="btn btn-sm btn-outline-primary">重试</button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
