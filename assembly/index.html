<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSIM 集成商管理平台 - 首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../chrome-compatibility.css">
    <link rel="stylesheet" href="assembly-common.css">
    <style>
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
        }
        .stat-number { font-size: 28px; font-weight: 700; margin: 10px 0; }
        .stat-label { color: #7f8c8d; font-size: 14px; }
        .stat-icon {
            width: 56px; height: 56px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
        }
        .quick-link {
            display: block;
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #2c3e50;
            border: 2px solid #e9ecef;
            transition: all 0.3s;
        }
        .quick-link:hover { border-color: #1a4a8c; color: #1a4a8c; box-shadow: 0 4px 12px rgba(26,74,140,0.15); }
        .quick-link i { font-size: 32px; margin-bottom: 8px; color: #1a4a8c; }
    </style>
</head>

                    <a class="nav-link nav-parent" data-bs-toggle="collapse" href="#navPricingCollapse" role="button" aria-expanded="false" aria-controls="navPricingCollapse"><i class="bi bi-currency-exchange"></i>报价管理<i class="bi bi-chevron-down float-end nav-parent-chevron"></i></a>
                    <div class="collapse nav-sub" id="navPricingCollapse">
                        <a class="nav-link nav-sub-link" href="catalog-list.html"><i class="bi bi-collection"></i>成本报价</a>

                    <a class="nav-link" href="order-list.html"><i class="bi bi-cart-check"></i>套餐订单</a>
                    <a class="nav-link" href="esim-list.html"><i class="bi bi-sim"></i>eSIM管理</a>
                    <a class="nav-link" href="billing-transactions.html"><i class="bi bi-wallet2"></i>财务与结算</a>
                    <div class="nav-section-title">开放能力</div>
                    <a class="nav-link" href="developer-api.html">
                        <i class="bi bi-key-fill"></i>API 管理

                </nav>

            <div class="col-md-10 main-content">
                <div class="page-header">
                    <div>
                        <h1><i class="bi bi-house-door me-2"></i>首页概览</h1>
                        <small class="text-muted">eSIM 集成商管理平台 · 预留仪表盘（兼容后续平台数据总览、排行、告警）</small>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-3">

                            <div class="d-flex justify-content-between align-items-start">

                                    <div class="stat-label">集成商总数</div>

                                </div>
                                <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                                    <i class="bi bi-people"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">

                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">

                                    <small class="text-muted">仪表盘接入后显示</small>
                                </div>

                                    <i class="bi bi-sim"></i>
                                </div>
                            </div>
                        </div>
                    </div>
