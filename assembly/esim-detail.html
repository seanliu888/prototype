<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSIM 详情 - eSIM 集成商管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../chrome-compatibility.css">
    <link rel="stylesheet" href="assembly-common.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 px-0 sidebar">
                <div class="brand-logo">
                    <i class="bi bi-building-gear me-2"></i>集成商管理
                </div>
                <nav class="nav flex-column">
                    <a class="nav-link" href="index.html"><i class="bi bi-house-door-fill"></i>首页概览</a>
                    <div class="nav-section-title">供应商</div>
                    <a class="nav-link" href="supplier-list.html"><i class="bi bi-truck"></i>供应商管理</a>
                    <div class="nav-section-title">集成商</div>
                    <a class="nav-link" href="integrator-list.html"><i class="bi bi-people-fill"></i>集成商管理</a>
                    <a class="nav-link nav-parent" data-bs-toggle="collapse" href="#navPricingCollapse" role="button" aria-expanded="false" aria-controls="navPricingCollapse"><i class="bi bi-currency-exchange"></i>报价管理<i class="bi bi-chevron-down float-end nav-parent-chevron"></i></a>
                    <div class="collapse nav-sub" id="navPricingCollapse">
                        <a class="nav-link nav-sub-link" href="catalog-list.html"><i class="bi bi-collection"></i>成本报价</a>
                        <a class="nav-link nav-sub-link" href="guide-pricing-list.html"><i class="bi bi-tags"></i>指导报价</a>
                        <a class="nav-link nav-sub-link" href="pricing-list.html"><i class="bi bi-currency-dollar"></i>特殊报价</a>
                    </div>
                    <a class="nav-link" href="order-list.html"><i class="bi bi-cart-check"></i>套餐订单</a>
                    <a class="nav-link active" href="esim-list.html"><i class="bi bi-sim"></i>eSIM管理</a>
                    <a class="nav-link" href="billing-transactions.html"><i class="bi bi-wallet2"></i>财务与结算</a>
                    <div class="nav-section-title">开放能力</div>
                    <a class="nav-link" href="developer-api.html"><i class="bi bi-key-fill"></i>API 管理</a>
                </nav>
            </div>
            <div class="col-md-10 main-content">
                <div class="page-header">
                    <div>
                        <h1><i class="bi bi-sim me-2"></i>eSIM 详情</h1>
                        <small class="text-muted">查看 eSIM 卡的基本信息、流量使用、关联套餐及已购加油包</small>
                    </div>
                    <a href="esim-list.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>返回列表</a>
                </div>

                <div class="content-card mb-4">
                    <h6 class="text-muted mb-3">基本信息</h6>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="info-row"><span class="info-label">ICCID</span><span class="info-value"><code id="detailIccid">—</code></span></div>
                            <div class="info-row"><span class="info-label">状态</span><span class="info-value" id="detailStatus">—</span></div>
                            <div class="info-row"><span class="info-label">设备</span><span class="info-value" id="detailDevice">—</span></div>
                        </div>
                        <div class="col-md-4">
                            <div class="info-row"><span class="info-label">套餐流量</span><span class="info-value" id="detailTotalTraffic">—</span></div>
                            <div class="info-row"><span class="info-label">已用流量</span><span class="info-value" id="detailUsedTraffic">—</span></div>
                            <div class="info-row"><span class="info-label">剩余流量</span><span class="info-value" id="detailRemainTraffic">—</span></div>
                        </div>
                        <div class="col-md-4">
                            <div class="info-row"><span class="info-label">剩余时间</span><span class="info-value" id="detailRemainTime">—</span></div>
                            <div class="info-row"><span class="info-label">激活时间</span><span class="info-value" id="detailActivateTime">—</span></div>
                            <div class="info-row"><span class="info-label">关联订单</span><span class="info-value" id="detailOrderNo">—</span></div>
                        </div>
                    </div>
                </div>

                <div class="content-card mb-4">
                    <h6 class="text-muted mb-3">关联套餐</h6>
                    <div class="table-responsive">
                        <table class="table table-sm table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>套餐名称</th>
                                    <th>流量规格</th>
                                    <th>有效期</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="detailPkgTbody"></tbody>
                        </table>
                    </div>
                </div>

                <div class="content-card mb-4">
                    <h6 class="text-muted mb-3">已购加油包</h6>
                    <div class="table-responsive">
                        <table class="table table-sm table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>加油包名称</th>
                                    <th>流量</th>
                                    <th>购买时间</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="detailAddonTbody"></tbody>
                        </table>
                    </div>
                    <p class="text-muted small mb-0" id="detailAddonEmpty" style="display: none;">暂无已购加油包</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var esimData = {
            '89852342022273174242': {
                iccid: '89852342022273174242',
                status: '已激活',
                device: 'iPhone 15',
                totalTraffic: '1GB',
                usedTraffic: '约 180 MB',
                remainTraffic: '约 820 MB',
                remainTime: '5 天',
                activateTime: '2025-02-25 10:30',
                orderNo: 'ORD-20250227001',
                pkg: { name: '亚洲 7 天 1GB', cap: '1GB', validity: '7 天', status: '有效' },
                addons: [
                    { name: '亚洲流量加油包', traffic: '500MB', time: '2025-02-26 15:30', status: '已用完' }
                ]
            },
            '89852342022273174243': {
                iccid: '89852342022273174243',
                status: '已激活',
                device: '—',
                totalTraffic: '3GB',
                usedTraffic: '约 900 MB',
                remainTraffic: '约 2.1 GB',
                remainTime: '12 天',
                activateTime: '2025-02-26 14:20',
                orderNo: 'ORD-20250227001',
                pkg: { name: '欧洲 15 天 3GB', cap: '3GB', validity: '15 天', status: '有效' },
                addons: [
                    { name: '欧洲流量加油包', traffic: '1GB', time: '2025-02-27 10:00', status: '使用中' },
                    { name: '欧洲流量加油包', traffic: '500MB', time: '2025-02-28 09:00', status: '未使用' }
                ]
            },
            '89852342022273174244': {
                iccid: '89852342022273174244',
                status: '已激活',
                device: 'Android',
                totalTraffic: '1GB',
                usedTraffic: '约 550 MB',
                remainTraffic: '约 450 MB',
                remainTime: '3 天',
                activateTime: '2025-02-27 09:15',
                orderNo: 'ORD-20250227002',
                pkg: { name: '日本 7 天 1GB', cap: '1GB', validity: '7 天', status: '有效' },
                addons: []
            },
            '89852342022273174245': {
                iccid: '89852342022273174245',
                status: '待激活',
                device: '—',
                totalTraffic: '1GB',
                usedTraffic: '0',
                remainTraffic: '1 GB',
                remainTime: '7 天',
                activateTime: '—',
                orderNo: 'ORD-20250228003',
                pkg: { name: '亚洲 7 天 1GB', cap: '1GB', validity: '7 天', status: '有效' },
                addons: []
            },
            '89852342022273174246': {
                iccid: '89852342022273174246',
                status: '已过期',
                device: '—',
                totalTraffic: '3GB',
                usedTraffic: '3GB',
                remainTraffic: '0',
                remainTime: '—',
                activateTime: '2025-02-10 08:00',
                orderNo: 'ORD-20250210001',
                pkg: { name: '欧洲 15 天 3GB', cap: '3GB', validity: '15 天', status: '已过期' },
                addons: [
                    { name: '欧洲流量加油包', traffic: '1GB', time: '2025-02-12 08:00', status: '已过期' }
                ]
            }
        };

        (function () {
            var params = new URLSearchParams(window.location.search);
            var iccid = params.get('iccid') || '89852342022273174242';
            var data = esimData[iccid] || esimData['89852342022273174242'];

            document.getElementById('detailIccid').textContent = data.iccid;
            var statusBadge = data.status === '已激活' ? '<span class="badge bg-success">已激活</span>' :
                              data.status === '待激活' ? '<span class="badge bg-secondary">待激活</span>' :
                              '<span class="badge bg-secondary">已过期</span>';
            document.getElementById('detailStatus').innerHTML = statusBadge;
            document.getElementById('detailDevice').textContent = data.device;
            document.getElementById('detailTotalTraffic').textContent = data.totalTraffic;
            document.getElementById('detailUsedTraffic').textContent = data.usedTraffic;
            document.getElementById('detailRemainTraffic').textContent = data.remainTraffic;
            document.getElementById('detailRemainTime').textContent = data.remainTime;
            document.getElementById('detailActivateTime').textContent = data.activateTime;
            document.getElementById('detailOrderNo').innerHTML = '<a href="order-detail.html?id=' + data.orderNo + '">' + data.orderNo + '</a>';

            var pkg = data.pkg;
            var pkgStatusBadge = pkg.status === '已过期' ? '<span class="badge bg-secondary">已过期</span>' : '<span class="badge bg-success">有效</span>';
            document.getElementById('detailPkgTbody').innerHTML = '<tr><td>' + pkg.name + '</td><td>' + pkg.cap + '</td><td>' + pkg.validity + '</td><td>' + pkgStatusBadge + '</td></tr>';

            var addons = data.addons || [];
            var addonTbody = document.getElementById('detailAddonTbody');
            var addonEmpty = document.getElementById('detailAddonEmpty');
            if (addons.length === 0) {
                addonTbody.innerHTML = '';
                addonEmpty.style.display = 'block';
            } else {
                addonEmpty.style.display = 'none';
                addonTbody.innerHTML = addons.map(function (a) {
                    var sBadge = a.status === '使用中' ? '<span class="badge bg-success">使用中</span>' :
                                 a.status === '未使用' ? '<span class="badge bg-info">未使用</span>' :
                                 a.status === '已用完' ? '<span class="badge bg-secondary">已用完</span>' :
                                 '<span class="badge bg-secondary">已过期</span>';
                    return '<tr><td>' + a.name + '</td><td>' + a.traffic + '</td><td>' + a.time + '</td><td>' + sBadge + '</td></tr>';
                }).join('');
            }
        })();
    </script>
</body>
</html>
