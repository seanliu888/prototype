<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增/编辑供应商 - eSIM 集成商管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../chrome-compatibility.css">
    <link rel="stylesheet" href="assembly-common.css">
    <style>
        .form-section-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #1a4a8c;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 px-0 sidebar">
                <div class="brand-logo">
                    <i class="bi bi-building-gear me-2"></i>集成商管理
                </div>
                <nav class="nav flex-column">
                    <a class="nav-link" href="index.html"><i class="bi bi-house-door-fill"></i>首页概览</a>
                    <div class="nav-section-title">供应商</div>
                    <a class="nav-link active" href="supplier-list.html"><i class="bi bi-truck"></i>供应商管理</a>
                    <a class="nav-link" href="catalog-list.html"><i class="bi bi-collection"></i>套餐目录</a>
                    <div class="nav-section-title">集成商</div>
                    <a class="nav-link" href="integrator-list.html"><i class="bi bi-people-fill"></i>集成商管理</a>
                    <a class="nav-link" href="pricing-list.html"><i class="bi bi-currency-dollar"></i>集成商定价</a>
                    <a class="nav-link" href="order-list.html"><i class="bi bi-cart-check"></i>套餐订单</a>
                    <a class="nav-link" href="esim-list.html"><i class="bi bi-sim"></i>eSIM管理</a>
                    <a class="nav-link" href="billing-transactions.html"><i class="bi bi-wallet2"></i>财务与结算</a>
                    <div class="nav-section-title">开放能力</div>
                    <a class="nav-link" href="developer-api.html"><i class="bi bi-key-fill"></i>开发者与 API</a>
                </nav>
            </div>
            <div class="col-md-10 main-content">
                <div class="page-header">
                    <div>
                        <h1><i class="bi bi-truck me-2"></i><span id="pageTitle">新增供应商</span></h1>
                        <small class="text-muted">维护供应商名称、编码等；同步周期可在保存后于列表页配置</small>
                    </div>
                    <a href="supplier-list.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>返回列表</a>
                </div>
                <div class="content-card">
                    <form>
                        <div class="form-section-title">基本信息</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">供应商名称 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" placeholder="请输入供应商名称" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">编码 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="supplierCode" placeholder="如 SUP-001" required>
                                <small class="text-muted" id="codeReadonlyHint" style="display: none;">编辑时编码不可修改</small>
                            </div>
                            <div class="col-md-6" id="statusRow" style="display: none;">
                                <label class="form-label">状态</label>
                                <select class="form-select">
                                    <option value="ACTIVE">正常</option>
                                    <option value="DISABLED">停用</option>
                                </select>
                            </div>
                        </div>
                        <hr>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>保存</button>
                            <a href="supplier-list.html" class="btn btn-outline-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            var params = new URLSearchParams(location.search);
            var id = params.get('id');
            var isEdit = !!id;
            if (isEdit) {
                document.getElementById('pageTitle').textContent = '编辑供应商';
                document.getElementById('statusRow').style.display = 'block';
                var codeInput = document.getElementById('supplierCode');
                if (codeInput) {
                    if (id) codeInput.value = id;
                    codeInput.readOnly = true;
                    codeInput.classList.add('bg-light');
                }
                var hint = document.getElementById('codeReadonlyHint');
                if (hint) hint.style.display = 'block';
            }
        })();
    </script>
</body>
</html>
