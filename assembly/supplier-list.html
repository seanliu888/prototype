<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应商管理 - eSIM 集成商管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../chrome-compatibility.css">
    <link rel="stylesheet" href="assembly-common.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 px-0 sidebar">
                <div class="brand-logo">
                    <i class="bi bi-building-gear me-2"></i>集成商管理
                </div>
                <nav class="nav flex-column">
                    <a class="nav-link" href="index.html"><i class="bi bi-house-door-fill"></i>首页概览</a>
                    <div class="nav-section-title">供应商</div>
                    <a class="nav-link active" href="supplier-list.html"><i class="bi bi-truck"></i>供应商管理</a>
                    <div class="nav-section-title">集成商</div>
                    <a class="nav-link" href="integrator-list.html"><i class="bi bi-people-fill"></i>集成商管理</a>
                    <a class="nav-link nav-parent" data-bs-toggle="collapse" href="#navPricingCollapse" role="button" aria-expanded="false" aria-controls="navPricingCollapse"><i class="bi bi-currency-exchange"></i>报价管理<i class="bi bi-chevron-down float-end nav-parent-chevron"></i></a>
                    <div class="collapse nav-sub" id="navPricingCollapse">
                        <a class="nav-link nav-sub-link" href="catalog-list.html"><i class="bi bi-collection"></i>成本报价</a>
                        <a class="nav-link nav-sub-link" href="guide-pricing-list.html"><i class="bi bi-tags"></i>指导报价</a>
                        <a class="nav-link nav-sub-link" href="pricing-list.html"><i class="bi bi-currency-dollar"></i>特殊报价</a>
                    </div>
                    <a class="nav-link" href="order-list.html"><i class="bi bi-cart-check"></i>套餐订单</a>
                    <a class="nav-link" href="esim-list.html"><i class="bi bi-sim"></i>eSIM管理</a>
                    <a class="nav-link" href="billing-transactions.html"><i class="bi bi-wallet2"></i>财务与结算</a>
                    <div class="nav-section-title">开放能力</div>
                    <a class="nav-link" href="developer-api.html"><i class="bi bi-key-fill"></i>API 管理</a>
                </nav>
            </div>
            <div class="col-md-10 main-content">
                <div class="page-header">
                    <div>
                        <h1><i class="bi bi-truck me-2"></i>供应商管理</h1>
                        <small class="text-muted">维护供应商信息（名称、编码等）；按供应商名称、状态筛选</small>
                    </div>
                </div>
                <div class="content-card">
                    <div class="filter-section">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">供应商名称</label>
                                <input type="text" class="form-control" placeholder="名称">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">状态</label>
                                <select class="form-select">
                                    <option value="">全部</option>
                                    <option value="ACTIVE">正常</option>
                                    <option value="DISABLED">停用</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">&nbsp;</label>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-primary flex-grow-1"><i class="bi bi-search me-1"></i>查询</button>
                                    <button class="btn btn-outline-secondary"><i class="bi bi-arrow-clockwise"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>名称</th>
                                    <th>编码</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr data-status="ACTIVE" data-code="SUP-001" data-name="eSIM 全球供">
                                    <td><strong>eSIM 全球供</strong></td>
                                    <td><code>SUP-001</code></td>
                                    <td><span class="badge bg-success supplier-status-badge">正常</span></td>
                                    <td>
                                        <div class="btn-group btn-group-sm">
                                            <a class="btn btn-outline-primary" href="supplier-detail.html?id=SUP-001"><i class="bi bi-eye me-1"></i>详情</a>
                                            <button type="button" class="btn btn-outline-secondary supplier-toggle-btn" title="禁用" onclick="supplierToggleStatus(this)"><i class="bi bi-pause-circle me-1"></i>禁用</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr data-status="ACTIVE" data-code="SUP-002" data-name="跨境 eSIM 源">
                                    <td><strong>跨境 eSIM 源</strong></td>
                                    <td><code>SUP-002</code></td>
                                    <td><span class="badge bg-success supplier-status-badge">正常</span></td>
                                    <td>
                                        <div class="btn-group btn-group-sm">
                                            <a class="btn btn-outline-primary" href="supplier-detail.html?id=SUP-002"><i class="bi bi-eye me-1"></i>详情</a>
                                            <button type="button" class="btn btn-outline-secondary supplier-toggle-btn" title="禁用" onclick="supplierToggleStatus(this)"><i class="bi bi-pause-circle me-1"></i>禁用</button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function supplierToggleStatus(btn) {
            var row = btn.closest('tr');
            var status = row.getAttribute('data-status');
            var name = row.getAttribute('data-name');
            var nextStatus = status === 'ACTIVE' ? 'DISABLED' : 'ACTIVE';
            var action = nextStatus === 'DISABLED' ? '禁用' : '启用';
            if (!confirm('确定要' + action + '供应商「' + name + '」吗？')) return;
            row.setAttribute('data-status', nextStatus);
            var badge = row.querySelector('.supplier-status-badge');
            if (badge) {
                badge.className = 'badge supplier-status-badge ' + (nextStatus === 'ACTIVE' ? 'bg-success' : 'bg-secondary');
                badge.textContent = nextStatus === 'ACTIVE' ? '正常' : '停用';
            }
            btn.innerHTML = nextStatus === 'ACTIVE' ? '<i class="bi bi-pause-circle me-1"></i>禁用' : '<i class="bi bi-play-circle me-1"></i>启用';
            btn.setAttribute('title', nextStatus === 'ACTIVE' ? '禁用' : '启用');
            alert('已' + action + '（原型演示）');
        }
    </script>
</body>
</html>
