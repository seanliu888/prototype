<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应商管理 - eSIM 集成商管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../chrome-compatibility.css">
    <link rel="stylesheet" href="assembly-common.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 px-0 sidebar">
                <div class="brand-logo">
                    <i class="bi bi-building-gear me-2"></i>集成商管理
                </div>
                <nav class="nav flex-column">
                    <a class="nav-link" href="index.html"><i class="bi bi-house-door-fill"></i>首页概览</a>
                    <div class="nav-section-title">业务管理</div>
                    <a class="nav-link" href="integrator-list.html"><i class="bi bi-people-fill"></i>集成商管理</a>
                    <a class="nav-link active" href="supplier-list.html"><i class="bi bi-truck"></i>供应商管理</a>
                    <a class="nav-link" href="catalog-list.html"><i class="bi bi-collection"></i>套餐目录</a>
                    <a class="nav-link" href="pricing-list.html"><i class="bi bi-currency-dollar"></i>集成商定价</a>
                    <a class="nav-link" href="order-list.html"><i class="bi bi-cart-check"></i>订单与用量</a>
                    <a class="nav-link" href="billing-transactions.html"><i class="bi bi-wallet2"></i>财务与结算</a>
                    <div class="nav-section-title">开放能力</div>
                    <a class="nav-link" href="developer-api.html"><i class="bi bi-key-fill"></i>开发者与 API</a>
                </nav>
            </div>
            <div class="col-md-10 main-content">
                <div class="page-header">
                    <div>
                        <h1><i class="bi bi-truck me-2"></i>供应商管理</h1>
                        <small class="text-muted">维护供应商信息（名称、编码、API 配置等）；按供应商名称、状态筛选</small>
                    </div>
                    <a href="supplier-form.html" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i>新增供应商</a>
                </div>
                <div class="content-card">
                    <div class="filter-section">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">供应商名称</label>
                                <input type="text" class="form-control" placeholder="名称">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">状态</label>
                                <select class="form-select">
                                    <option value="">全部</option>
                                    <option value="ACTIVE">正常</option>
                                    <option value="DISABLED">停用</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">&nbsp;</label>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-primary flex-grow-1"><i class="bi bi-search me-1"></i>查询</button>
                                    <button class="btn btn-outline-secondary"><i class="bi bi-arrow-clockwise"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>名称</th>
                                    <th>编码</th>
                                    <th>API 配置</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><strong>eSIM 全球供</strong></td>
                                    <td><code>SUP-001</code></td>
                                    <td><small>API 端点已配置</small></td>
                                    <td><span class="badge bg-success">正常</span></td>
                                    <td>
                                        <div class="btn-group btn-group-sm">
                                            <a class="btn btn-outline-warning" href="supplier-form.html?id=SUP-001" title="编辑"><i class="bi bi-pencil"></i></a>
                                            <button class="btn btn-outline-primary" title="立即同步"><i class="bi bi-arrow-repeat"></i> 同步</button>
                                            <a class="btn btn-outline-secondary btn-sm" href="supplier-sync-log.html" title="查看同步日志">同步日志</a>
                                            <a class="btn btn-outline-info" href="catalog-list.html?supplier=SUP-001">套餐目录</a>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td><strong>跨境 eSIM 源</strong></td>
                                    <td><code>SUP-002</code></td>
                                    <td><small>API 端点已配置</small></td>
                                    <td><span class="badge bg-success">正常</span></td>
                                    <td>
                                        <div class="btn-group btn-group-sm">
                                            <a class="btn btn-outline-warning" href="supplier-form.html?id=SUP-002"><i class="bi bi-pencil"></i></a>
                                            <button class="btn btn-outline-primary"><i class="bi bi-arrow-repeat"></i> 同步</button>
                                            <a class="btn btn-outline-secondary btn-sm" href="supplier-sync-log.html" title="查看同步日志">同步日志</a>
                                            <a class="btn btn-outline-info" href="catalog-list.html?supplier=SUP-002">套餐目录</a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
